version: '3.8'

services:
  real-madrid-bot:
    build: .
    container_name: real-madrid-bot-new
    restart: unless-stopped
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./.env:/app/.env:ro
      - ./subscriptions.json:/app/subscriptions.json
    environment:
      - TZ=Europe/Moscow
